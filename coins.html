<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Купить Zcoin — Z-Horror</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo-link"><img src="assets/logo.png" alt="Z-Horror" class="logo-img"></a>
        <nav class="nav-links">
            <a href="index.html">Главная</a>
            <a href="coins.html" class="active">Купить Zcoin</a>
            <a href="privileges.html">Привилегии</a>
            <a href="unban.html">Разбан</a>
            <a href="rules.html">Правила</a>
            <a href="wiki.html">Вики</a>
            <a href="https://discord.gg/cx35GuHAbH" target="_blank" class="discord-btn">Discord</a>
        </nav>
    </header>

    <main class="page-content">
        <h1 class="page-title">Купить Zcoin</h1>
        <p class="page-subtitle">1 ₽ = 1 Zcoin • Автоматическое зачисление</p>

        <div class="steam-block">
            <label>Твой SteamID (обязательно):</label>
            <input type="text" id="steamId" placeholder="STEAM_0:1:12345678" class="steam-input">
            <small>Как узнать SteamID → <a href="https://steamid.io" target="_blank">steamid.io</a></small>
        </div>

        <div class="coins-grid">
            <div class="coin-pack" onclick="pay(100)">
                <h3>100 Zcoin</h3>
                <div class="price">100 ₽</div>
                <button class="buy-btn">Купить</button>
            </div>
            <div class="coin-pack" onclick="pay(250)">
                <h3>250 Zcoin</h3>
                <div class="price">250 ₽</div>
                <button class="buy-btn">Купить</button>
            </div>
            <div class="coin-pack featured" onclick="pay(500)">
                <h3>550 Zcoin</h3>
                <div class="price">500 ₽</div>
                <span class="bonus">+50 бонус</span>
                <button class="buy-btn">Купить</button>
            </div>
            <div class="coin-pack" onclick="pay(1000)">
                <h3>1150 Zcoin</h3>
                <div class="price">1000 ₽</div>
                <span class="bonus">+150 бонус</span>
                <button class="buy-btn">Купить</button>
            </div>
        </div>

        <div class="custom-pay">
            <h3>Своя сумма</h3>
            <input type="number" id="customSum" placeholder="Сумма от 100 ₽" min="100">
            <button class="buy-btn" onclick="payCustom()">Оплатить</button>
        </div>
    </main>

    <script>
        function pay(amount) {
            const steam = document.getElementById('steamId').value.trim();
            if (!steam) {
                alert('Сначала введи свой SteamID!');
                return;
            }
            const url = `https://www.donationalerts.com/r/ВАШ_НИК?name=${encodeURIComponent(steam)}&amount=${amount}&message=Zcoin`;
            window.open(url, '_blank');
        }

        function payCustom() {
            const sum = document.getElementById('customSum').value;
            if (sum < 100) {
                alert('Минимум 100 рублей');
                return;
            }
            pay(sum);
        }
    </script>
</body>
</html>
